apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy-logs
data:
  config.alloy: |
    // Discover pods cluster-wide; per-node filtering happens via filesystem
    // (local.file_match only finds files for pods running on this node).
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "kube-system"
        action        = "drop"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      // Point at the kubelet on-disk log file so we can read raw CRI lines.
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        action        = "replace"
        target_label  = "__path__"
        replacement   = "/var/log/pods/*$1/*.log"
      }
    }

    local.file_match "pods" {
      path_targets = discovery.relabel.pods.output
    }

    loki.source.file "pods" {
      targets    = local.file_match.pods.targets
      forward_to = [loki.process.extract.receiver]
    }

    loki.process "extract" {
      forward_to = [loki.write.loki.receiver]
      // Parse CRI log format (timestamp / stream / tag / log) — files under
      // /var/log/pods on containerd are in this format.
      stage.cri {}
      stage.labels {
        values = { stream = "" }
      }
      stage.regex {
        expression = `trace_id[=:]\s*(?P<trace_id>[a-fA-F0-9]{16,32})`
      }
      stage.labels {
        values = { trace_id = "" }
      }
    }

    loki.write "loki" {
      endpoint {
        url       = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
        tenant_id = "logs"
      }
    }
