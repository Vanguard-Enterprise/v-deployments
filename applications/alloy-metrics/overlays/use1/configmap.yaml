apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy-metrics
data:
  config.alloy: |
    prometheus.remote_write "mimir" {
      external_labels = {
        cluster = "use1",
      }
      endpoint {
        url = "http://mimir.mimir.svc.cluster.local:8080/api/v1/push"
        headers = {
          "X-Scope-OrgID" = "metrics",
        }
      }
    }

    // Pass-through relabel — keeps the wiring shape but forwards everything
    // (Mimir per-tenant limit is 1M series, so we keep all cAdvisor metrics
    // including container_spec_cpu_quota, container_fs_limit_bytes, etc.
    // which dashboards filter on).
    prometheus.relabel "drop_high_cardinality" {
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    // Drop client-go / controller-runtime latency histograms. Their _bucket
    // series are internal instrumentation nobody dashboards and dominate some
    // exporters (longhorn-backend was ~10k of its ~16k series). Applied to the
    // operator pod/service monitor scrapes (longhorn, argocd, etc.).
    prometheus.relabel "drop_clientgo_histograms" {
      forward_to = [prometheus.remote_write.mimir.receiver]
      rule {
        source_labels = ["__name__"]
        regex         = "(.*_)?(rest_client|workqueue)_.+_bucket"
        action        = "drop"
      }
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "kubelet" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_node_label_(.+)"
      }
    }

    discovery.relabel "kubelet_cadvisor" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_node_label_(.+)"
      }
      rule {
        target_label = "metrics_path"
        replacement  = "/metrics/cadvisor"
      }
    }

    discovery.kubernetes "ksm" {
      role = "service"
      selectors {
        role  = "service"
        label = "app.kubernetes.io/name=kube-state-metrics"
      }
    }

    prometheus.scrape "kubelet" {
      targets         = discovery.relabel.kubelet.output
      scrape_interval = "60s"
      scheme          = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.scrape "kubelet_cadvisor" {
      targets         = discovery.relabel.kubelet_cadvisor.output
      scrape_interval = "60s"
      scheme          = "https"
      job_name        = "kubelet"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }
      forward_to = [prometheus.relabel.drop_high_cardinality.receiver]
    }

    prometheus.scrape "ksm" {
      targets         = discovery.kubernetes.ksm.targets
      scrape_interval = "60s"
      job_name        = "kube-state-metrics"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.operator.podmonitors "primary" {
      forward_to = [prometheus.relabel.drop_clientgo_histograms.receiver]
      selector { match_labels = { instance = "primary" } }
    }

    prometheus.operator.servicemonitors "primary" {
      forward_to = [prometheus.relabel.drop_clientgo_histograms.receiver]
      selector { match_labels = { instance = "primary" } }
    }
