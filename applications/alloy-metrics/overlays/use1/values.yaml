alloy:
  configMap:
    create: false
    name: alloy-config
    key: config.alloy
  clustering:
    enabled: true
    portName: http
  # Bound the collector's footprint. It previously ran with no limit and ~1
  # GiB RSS/pod (~820 MiB live Go heap for ~120k active series). GOMEMLIMIT
  # (~88% of the memory limit) makes the Go GC reclaim headroom before the
  # hard cap, holding RSS down without thrashing; the limit prevents
  # unbounded growth / node memory pressure. No CPU limit — don't throttle a
  # scraper.
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 1536Mi
  extraEnv:
    - name: GOMEMLIMIT
      value: "1350MiB"
rbac:
  create: true
  #rules: []
  clusterRules:
    - apiGroups: ["", "discovery.k8s.io", "networking.k8s.io"]
      resources: ["endpoints", "endpointslices", "ingresses", "pods", "services", "namespaces", "nodes", "nodes/proxy", "nodes/metrics", "nodes/stats", "configmaps", "secrets", "events"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps", "extensions"]
      resources: ["replicasets", "daemonsets", "deployments", "statefulsets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["cronjobs", "jobs"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["monitoring.grafana.com"]
      resources: ["podlogs"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["monitoring.coreos.com"]
      resources: ["prometheusrules", "podmonitors", "servicemonitors", "probes", "scrapeconfigs"]
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]

serviceAccount:
  create: true
  name: alloy-metrics
  automountServiceAccountToken: true

controller:
  type: "daemonset"