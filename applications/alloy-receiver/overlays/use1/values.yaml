alloy:
  configMap:
    create: false
    name: alloy-config
    key: config.alloy
  clustering:
    enabled: true
    portName: http
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: pyroscope
      port: 4040
      targetPort: 4040
      protocol: TCP

rbac:
  create: true

serviceAccount:
  create: true
  name: alloy-receiver

controller:
  type: statefulset
  replicas: 2
