apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-image-updater
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghcr-image-updater
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .mysecret | toString }}"
  data:
    - secretKey: mysecret
      remoteRef:
        key: dockerconfig/aliencord-github
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
