apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-ddns-secret
  namespace: cloudflare-ddns
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-ddns-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: "cert-manager/cloudflare-token"
        property: vanguard-cloudflare-token
