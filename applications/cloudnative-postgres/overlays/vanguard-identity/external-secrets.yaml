apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vanguard-identity-db-secrets
  namespace: vanguard-identity-db
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vanguard-identity-db-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: vanguard/production/pg/identity
        property: username
    - secretKey: password
      remoteRef:
        key: vanguard/production/pg/identity
        property: db_password
