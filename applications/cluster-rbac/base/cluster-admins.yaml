apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-cluster-admins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  # Zitadel `groups` claim value, prefixed by the apiserver --oidc-groups-prefix=oidc:
  - kind: Group
    name: oidc:k8s_cluster_admins
    apiGroup: rbac.authorization.k8s.io
