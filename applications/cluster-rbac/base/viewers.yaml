apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-viewers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  # Cluster-wide read-only. NOTE: the built-in `view` role intentionally excludes Secrets.
  - kind: Group
    name: oidc:k8s_viewers
    apiGroup: rbac.authorization.k8s.io
