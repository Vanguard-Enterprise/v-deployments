# Namespace-scoped `edit` for the k8s_developers group across the application namespaces.
# Extend by copying a RoleBinding block for any new app namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-developers
  namespace: rustlens-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: Group
    name: oidc:k8s_developers
    apiGroup: rbac.authorization.k8s.io
---
