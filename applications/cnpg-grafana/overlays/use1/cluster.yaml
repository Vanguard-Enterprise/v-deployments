apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-db
  namespace: grafana
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    # Temp bump from 2Gi while USE2 WAL archive target is down — WALs accumulate
    # locally and CNPG refuses to start at low free space. Shrink back once
    # barman-cloud-wal-archive to s3://cnpg-grafana-use1 is healthy again
    # (shrink requires cluster recreate; PVCs can't shrink in-place).
    size: 10Gi
    storageClass: longhorn
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-grafana-use1
      endpointURL: https://backup-storage.vngenterprise.com
      s3Credentials:
        accessKeyId:
          name: cnpg-grafana-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-grafana-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
