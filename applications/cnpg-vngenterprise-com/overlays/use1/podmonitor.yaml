apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vngenterprise-com-db-cnpg
  namespace: vngenterprise-com
  labels:
    instance: primary
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: vngenterprise-com-db
  podMetricsEndpoints:
    - port: metrics
      interval: 60s
