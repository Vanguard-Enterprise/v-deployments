# Corefile body captured verbatim from kube-system/coredns on 2026-05-12
# (cluster: use1) with one inserted rewrite directive that keeps in-cluster
# netbird-client pods off the public Cloudflare path for netbird.vngenterprise.com.
# Re-capture and update this file before any CoreDNS upgrade that may
# modify the default Corefile shape.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        # Keep in-cluster netbird-client pods off the public Cloudflare path.
        # netbird.vngenterprise.com is CF-proxied; CF's ~100s connection cap
        # kept killing the long-lived management/signal gRPC stream (repeated
        # 504s -> ICE agent never initialized -> peers stuck on relay).
        # Resolve it to the in-cluster Traefik service instead; the Host header
        # is unchanged so the existing IngressRoute still routes mgmt/signal/relay.
        rewrite name netbird.vngenterprise.com traefik.traefik.svc.cluster.local
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
