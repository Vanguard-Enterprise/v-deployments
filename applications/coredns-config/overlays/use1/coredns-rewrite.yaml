# Corefile body captured verbatim from kube-system/coredns on 2026-05-12
# (cluster: use1) with one inserted rewrite directive for backup-storage.
# Re-capture and update this file before any CoreDNS upgrade that may
# modify the default Corefile shape.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        rewrite name backup-storage.vngenterprise.com backup-storage.netbird-client.svc.cluster.local
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
