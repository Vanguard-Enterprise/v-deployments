apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-contact-points
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: discord-platform
        receivers:
          - uid: discord-platform
            type: discord
            settings:
              url: $DISCORD_PLATFORM_WEBHOOK
              use_discord_username: true
              title: '{{ template "discord.title" . }}'
              message: '{{ template "discord.message" . }}'

      - orgId: 1
        name: discord-rustlens
        receivers:
          - uid: discord-rustlens
            type: discord
            settings:
              url: $DISCORD_RUSTLENS_WEBHOOK
              use_discord_username: true
              title: '{{ template "discord.title" . }}'
              message: '{{ template "discord.message" . }}'

      - orgId: 1
        name: discord-vanguard
        receivers:
          - uid: discord-vanguard
            type: discord
            settings:
              url: $DISCORD_VANGUARD_WEBHOOK
              use_discord_username: true
              title: '{{ template "discord.title" . }}'
              message: '{{ template "discord.message" . }}'
