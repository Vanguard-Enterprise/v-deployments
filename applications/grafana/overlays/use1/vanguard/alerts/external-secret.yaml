apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-alerting
  namespace: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-alerting
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DISCORD_PLATFORM_WEBHOOK
      remoteRef:
        key: monitoring/grafana-alerting
        property: DISCORD_PLATFORM_WEBHOOK
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DISCORD_RUSTLENS_WEBHOOK
      remoteRef:
        key: monitoring/grafana-alerting
        property: DISCORD_RUSTLENS_WEBHOOK
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DISCORD_VANGUARD_WEBHOOK
      remoteRef:
        key: monitoring/grafana-alerting
        property: DISCORD_VANGUARD_WEBHOOK
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
