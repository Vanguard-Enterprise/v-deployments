apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-notification-policies
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord-platform
        group_by: [alertname, namespace]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - receiver: discord-rustlens
            object_matchers:
              - [team, "=", rustlens]
            continue: false
          - receiver: discord-vanguard
            object_matchers:
              - [team, "=", vanguard]
            continue: false
