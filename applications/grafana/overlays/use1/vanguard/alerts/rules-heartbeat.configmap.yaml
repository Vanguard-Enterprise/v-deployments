apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-rules-heartbeat
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: heartbeat
        folder: platform
        interval: 1m
        rules:
          - uid: heartbeat-weekly
            title: WeeklyHeartbeat
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 60, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'vector(1)'
                  refId: A
            noDataState: OK
            for: 0s
            labels:
              severity: info
              team: platform
            annotations:
              summary: "Monitoring pipeline heartbeat — if you see this on Discord weekly, alerting works"
