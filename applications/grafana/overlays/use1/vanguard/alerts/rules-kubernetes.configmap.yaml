apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-rules-kubernetes
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  rules-kubernetes.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: kubernetes
        folder: platform
        interval: 1m
        rules:
          - uid: kubernetes-pod-crashloop
            title: PodCrashLooping
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'increase(kube_pod_container_status_restarts_total[15m]) > 5'
                  refId: A
            noDataState: OK
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"

          - uid: kubernetes-pod-pending
            title: PodPending
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'kube_pod_status_phase{phase="Pending"} == 1'
                  refId: A
            noDataState: OK
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} pending >10m"

          - uid: kubernetes-ds-rollout-incomplete
            title: DaemonSetRolloutIncomplete
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'kube_daemonset_status_number_ready != kube_daemonset_status_desired_number_scheduled'
                  refId: A
            noDataState: OK
            for: 15m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} not fully rolled out"

          - uid: kubernetes-deploy-replicas-mismatch
            title: DeploymentReplicasMismatch
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'kube_deployment_status_replicas != kube_deployment_spec_replicas'
                  refId: A
            noDataState: OK
            for: 15m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"

          - uid: kubernetes-pvc-usage-high
            title: PVCUsageHigh
            condition: A
            isPaused: true
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: mimir
                model:
                  expr: 'kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.90'
                  refId: A
            noDataState: OK
            for: 10m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} >90% full"
