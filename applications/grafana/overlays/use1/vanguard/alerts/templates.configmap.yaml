apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-templates
  namespace: grafana
  labels:
    grafana_alert: "1"
data:
  templates.yaml: |
    apiVersion: 1
    templates:
      - orgId: 1
        name: discord.title
        template: |
          {{ define "discord.title" -}}
          {{- $name := .CommonLabels.alertname -}}{{- if not $name -}}{{- $name = "alerts" -}}{{- end -}}
          {{- if .Alerts.Firing -}}
          🔥 {{ len .Alerts.Firing }} firing{{ if .Alerts.Resolved }} · ✅ {{ len .Alerts.Resolved }} resolved{{ end }} — {{ $name }}
          {{- else -}}
          ✅ {{ len .Alerts.Resolved }} resolved — {{ $name }}
          {{- end -}}
          {{- end }}

      - orgId: 1
        name: discord.alert
        template: |
          {{ define "discord.alert" -}}
          {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} **{{ .Labels.alertname }}**
          {{ if .Annotations.summary }}> {{ .Annotations.summary }}{{ end }}
          {{- if .Annotations.description }}

          {{ .Annotations.description }}{{ end }}

          `{{ if eq .Labels.severity "critical" }}🚨 critical{{ else if eq .Labels.severity "warning" }}⚠️ warning{{ else if eq .Labels.severity "info" }}ℹ️ info{{ else if .Labels.severity }}⚪ {{ .Labels.severity }}{{ else }}⚪ —{{ end }}`{{ if .Labels.team }} `team:{{ .Labels.team }}`{{ end }}{{ if .Labels.namespace }} `ns:{{ .Labels.namespace }}`{{ end }}{{ if .Labels.node }} `node:{{ .Labels.node }}`{{ end }}{{ if .Labels.pod }} `pod:{{ .Labels.pod }}`{{ end }}{{ if .Labels.instance }} `instance:{{ .Labels.instance }}`{{ end }}
          {{ if .GeneratorURL }}[Grafana]({{ .GeneratorURL }}){{ end }}{{ if .SilenceURL }} · [Silence]({{ .SilenceURL }}){{ end }}{{ if .Annotations.runbook_url }} · [Runbook]({{ .Annotations.runbook_url }}){{ end }}{{ if .Annotations.dashboard_url }} · [Dashboard]({{ .Annotations.dashboard_url }}){{ end }}
          {{- end }}

      - orgId: 1
        name: discord.message
        template: |
          {{ define "discord.message" -}}
          {{ range $i, $a := .Alerts -}}
          {{ if $i }}

          ━━━━━━━━━━━━━━━━━━━

          {{ end -}}
          {{ template "discord.alert" $a }}
          {{ end -}}
          {{- end }}
