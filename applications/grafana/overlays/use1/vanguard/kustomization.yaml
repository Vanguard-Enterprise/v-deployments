apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - grafana.vngenterprise.com.yaml
  - monitoring.yaml
  - external-secret-admin.yaml
  - ./alerts
  - ./dashboards
helmCharts:
  - name: grafana
    version: "10.1.4"
    repo: https://grafana.github.io/helm-charts
    releaseName: grafana
    namespace: grafana
    valuesFile: values.yaml
