persistence:
  enabled: false
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password
grafana.ini:
  database:
    type: postgres
    host: grafana-db-rw.grafana.svc.cluster.local:5432
    name: grafana
    user: grafana
    ssl_mode: require
  grafana_net:
    url: https://grafana.vngenterprise.com
  server:
    root_url: https://grafana.vngenterprise.com
  auth.generic_oauth:
    enabled: true
    name: "VANGUARD SSO"
    allow_sign_up: true
    client_id: "356670791548470770"
    auth_url: https://accounts.vngenterprise.com/oauth/v2/authorize
    token_url: https://accounts.vngenterprise.com/oauth/v2/token
    api_url: https://accounts.vngenterprise.com/oidc/v1/userinfo
    role_attribute_path: "contains(groups[*], 'monitoring_admin') && 'GrafanaAdmin' || contains(groups[*], 'monitoring_editor') && 'Editor' || 'Viewer'"
    allow_assign_grafana_admin: true
    role_attribute_strict: true
    email_attribute_name: "email:primary"
    email_attribute_path: "email"
    scopes: "openid email profile offline_access roles"
    auto_login: true
    use_pkce: true
    use_refresh_token: true
envValueFrom:
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-db-app
      key: password
envFromSecrets:
  - name: grafana-alerting
# Datasources mounted directly by the chart so they exist at Grafana startup
# (sidecar discovery races with provisioning init).
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        url: http://mimir.mimir.svc.cluster.local:8080/prometheus
        isDefault: true
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "metrics"
      - name: Mimir-Traces
        uid: mimir-traces
        type: prometheus
        access: proxy
        url: http://mimir.mimir.svc.cluster.local:8080/prometheus
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "traces"
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.loki.svc.cluster.local:3100
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          derivedFields:
            - matcherRegex: 'trace_id[=:]\s*([a-fA-F0-9]{16,32})'
              name: TraceID
              datasourceUid: tempo
              url: '$${__value.raw}'
        secureJsonData:
          httpHeaderValue1: "logs"
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.tempo.svc.cluster.local:3200
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          tracesToLogsV2:
            datasourceUid: loki
            tags:
              - key: "service.name"
                value: "service"
              - key: "namespace"
              - key: "pod"
            filterByTraceID: true
            spanStartTimeShift: '-1m'
            spanEndTimeShift: '1m'
          tracesToMetrics:
            datasourceUid: mimir
            tags:
              - key: "service.name"
                value: "service"
              - key: "namespace"
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
        secureJsonData:
          httpHeaderValue1: "traces"
      - name: Pyroscope
        uid: pyroscope
        type: grafana-pyroscope-datasource
        access: proxy
        url: http://pyroscope.pyroscope.svc.cluster.local:4040
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "profiles"
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_dashboard_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: false
  alerts:
    enabled: true
    label: grafana_alert
    labelValue: "1"
    searchNamespace: ALL
  notifiers:
    enabled: false
resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 1Gi }
deploymentStrategy:
  type: Recreate
