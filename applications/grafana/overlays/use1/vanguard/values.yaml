persistence:
  enabled: false
grafana.ini:
  database:
    type: postgres
    host: grafana-db-rw.grafana.svc.cluster.local:5432
    name: grafana
    user: grafana
    ssl_mode: require
  grafana_net:
    url: https://grafana.vngenterprise.com
  server:
    root_url: https://grafana.vngenterprise.com
  auth.generic_oauth:
    enabled: true
    name: "VANGUARD SSO"
    allow_sign_up: true
    client_id: "356670791548470770"
    auth_url: https://accounts.vngenterprise.com/oauth/v2/authorize
    token_url: https://accounts.vngenterprise.com/oauth/v2/token
    api_url: https://accounts.vngenterprise.com/oidc/v1/userinfo
    role_attribute_path: "contains(groups[*], 'monitoring_admin') && 'GrafanaAdmin' || contains(groups[*], 'monitoring_editor') && 'Editor' || 'Viewer'"
    allow_assign_grafana_admin: true
    role_attribute_strict: true
    email_attribute_name: "email:primary"
    email_attribute_path: "email"
    scopes: "openid email profile offline_access roles"
    auto_login: true
    use_pkce: true
    use_refresh_token: true
env:
  GF_DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: grafana-db-app
        key: password
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_dashboard_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: ALL
  alerts:
    enabled: true
    label: grafana_alert
    labelValue: "1"
    searchNamespace: ALL
  notifiers:
    enabled: false
resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 1Gi }
deploymentStrategy:
  type: Recreate
