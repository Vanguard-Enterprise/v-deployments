apiVersion: v1
kind: ConfigMap
metadata:
  name: hyplex-services-config
  namespace: hyplex-auth
data:
  REDIS_ADDR: "hyplex-redis-master.hyplex-redis.svc.cluster.local:6379"
  NATS_URL: "nats://nats.nats.svc.cluster.local:4222"
  VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
  LOG_LEVEL: "info"
  LOG_PRETTY: "false"
  DB_HOST: "auth-service-rw.auth-service-db.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "auth"
  DB_USER: "auth"
  DB_SSLMODE: "require"
