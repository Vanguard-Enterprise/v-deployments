apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: loki
  namespace: loki
  labels:
    instance: primary
spec:
  selector:
    matchLabels:
      app: loki
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      relabelings:
        - targetLabel: job
          replacement: loki/loki
