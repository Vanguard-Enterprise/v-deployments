apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-grafana-basicauth
  namespace: mcp-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: mcp-grafana-basicauth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # htpasswd line (claude:$apr1$...) for the Traefik basicAuth middleware.
    # MUST be the ONLY key in this Secret: Traefik's basicAuth loader requires
    # the referenced Secret to contain exactly one element.
    - secretKey: users
      remoteRef:
        key: monitoring/mcp-grafana
        property: basic-auth-users
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
