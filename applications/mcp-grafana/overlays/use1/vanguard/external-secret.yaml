apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-grafana
  namespace: mcp-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: mcp-grafana-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Grafana Admin service-account token -> GRAFANA_SERVICE_ACCOUNT_TOKEN
    - secretKey: grafana-api-key
      remoteRef:
        key: monitoring/mcp-grafana
        property: grafana-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # htpasswd line (claude:$apr1$...) consumed by the Traefik basicAuth
    # middleware via its expected `users` key.
    - secretKey: users
      remoteRef:
        key: monitoring/mcp-grafana
        property: basic-auth-users
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
