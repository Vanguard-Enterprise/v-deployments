minio:
  enabled: false

vaultAgent:
  enabled: false

alertmanager:
  enabled: false      # using Grafana Unified Alerting

ruler:
  enabled: false      # Grafana handles alert rules

gateway:
  enabled: true
  replicas: 1

kafka:
  enabled: false

mimir:
  structuredConfig:
    limits:
      compactor_blocks_retention_period: 14d
      max_total_query_length: 72h
    common:
      storage:
        backend: s3
        s3:
          bucket_name: "${RULER_BUCKET_NAME}"
          endpoint: "${AWS_ENDPOINTS}"
          insecure: false
          access_key_id: "${AWS_ACCESS_KEY_ID}"
          secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
    tenant_federation:
      enabled: true
    blocks_storage:
      backend: s3
      s3:
        bucket_name: "${TSDB_BUCKET_NAME}"
      tsdb:
        block_ranges_period: ["1h"]
        retention_period: 6h
        head_compaction_interval: 15m
        head_compaction_idle_timeout: 1h
    alertmanager_storage:
      backend: s3
      s3:
        bucket_name: "${RULER_BUCKET_NAME}"
    ruler_storage:
      backend: s3
      s3:
        bucket_name: "${RULER_BUCKET_NAME}"
    ingest_storage:
      enabled: false
    ingester:
      ring:
        replication_factor: 1
      push_grpc_method_enabled: true

# Per-component scaling — keep it tight (1 replica each).
distributor:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }

querier:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }

query_frontend:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 512Mi }

query_scheduler:
  enabled: false      # query_frontend at 1 replica is enough; scheduler is for HA fanout

overrides_exporter:
  enabled: false

ingester:
  statefulSet:
    enabled: true
  replicas: 1
  persistentVolume:
    size: 10Gi
    storageClass: "longhorn"     # 2-replica: WAL is diagnosis-critical
  zoneAwareReplication:
    enabled: false
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 1, memory: 2Gi }

store_gateway:
  replicas: 1
  persistentVolume:
    size: 5Gi
    storageClass: "longhorn-single"   # cache, rebuilds from S3
  zoneAwareReplication:
    enabled: false
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }

compactor:
  replicas: 1
  persistentVolume:
    size: 5Gi
    storageClass: "longhorn-single"   # working dir, ephemeral
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }

# In-memory memcached caches
chunks-cache:
  enabled: true
  replicas: 1
  allocatedMemory: 512
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 768Mi }

index-cache:
  enabled: true
  replicas: 1
  allocatedMemory: 256

metadata-cache:
  enabled: true
  replicas: 1
  allocatedMemory: 128

results-cache:
  enabled: true
  replicas: 1
  allocatedMemory: 256

# minio is disabled (storage is external offsite s3)

global:
  extraEnvFrom:
    - secretRef:
        name: mimir-global-env
