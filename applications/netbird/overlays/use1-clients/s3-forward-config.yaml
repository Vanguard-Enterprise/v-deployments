apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-forward-config
  namespace: netbird-client
data:
  haproxy.cfg: |
    global
        log stdout format raw local0 info

    defaults
        log     global
        mode    tcp
        timeout connect 5s
        timeout client  1h
        timeout server  1h

    # Resolve via the local NetBird daemon's embedded DNS resolver. Each
    # pod runs its OWN NetBird daemon at its OWN WG IP, so __NETBIRD_DNS_IP__
    # is substituted at container startup by the wrapper script in the
    # StatefulSet (reads the actual nameserver from /etc/resolv.conf).
    # `parse-resolv-conf` was attempted first but haproxy 2.8 read it before
    # the in-pod NetBird daemon finished overwriting /etc/resolv.conf and
    # ended up parsing the kubelet-injected cluster CoreDNS IP, which
    # resolves backup-storage.vngenterprise.com back to our own Service
    # ClusterIP (via CoreDNS rewrite) — a loop.
    resolvers netbird-dns
        nameserver netbird __NETBIRD_DNS_IP__:53
        resolve_retries 3
        timeout resolve 5s
        timeout retry   2s
        hold valid      5m
        hold other      30s
        hold refused    30s
        hold nx         30s
        hold timeout    60s

    frontend s3-in
        bind *:443
        default_backend s3-out

    backend s3-out
        # init-addr none: don't fight cluster CoreDNS during pod startup.
        # The resolvers section is the only source of truth for the upstream
        # IP; haproxy refreshes per `hold valid` and on connection attempts.
        # No `check`: rustfs is a trusted upstream; we don't want haproxy to
        # mark the server DOWN on transient DNS hiccups during WG bringup,
        # because once DOWN it stops accepting connections. Longhorn retries
        # on connection failures via the AWS SDK.
        # resolve-prefer ipv4 — skip AAAA which NetBird DNS doesn't serve.
        server backup-storage backup-storage.vngenterprise.com:443 resolvers netbird-dns resolve-prefer ipv4 init-addr none
