apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      containers:
        - name: client
          image: netbirdio/netbird:0.70.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: alpine/socat:1.7.4.4
          imagePullPolicy: IfNotPresent
          # Hardcoded NetBird-side IP for backup-storage.vngenterprise.com.
          # musl libc's getaddrinfo fails ("Name has no usable address") against
          # NetBird's DNS with this resolv.conf shape (ndots:5 + 6 search
          # domains). nslookup works, glibc would work, but socat-in-alpine
          # doesn't. If the rustfs peer is re-registered in NetBird and gets a
          # new mesh IP, update both the address here and §5.1 of the design
          # spec. Verify with: nslookup backup-storage.vngenterprise.com from
          # the client container.
          args:
            - "-d"
            - "TCP4-LISTEN:443,fork,reuseaddr"
            - "TCP4:100.107.29.143:443"
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
