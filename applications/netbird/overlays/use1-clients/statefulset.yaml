apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      containers:
        - name: client
          image: netbirdio/netbird:0.70.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: haproxy:2.8.10
          imagePullPolicy: IfNotPresent
          # Debian-based (glibc) haproxy with `parse-resolv-conf` in the
          # resolvers section. Each NetBird-client pod runs its OWN embedded
          # DNS resolver at its OWN NetBird IP (different per pod), so we
          # cannot hardcode the nameserver — we let haproxy read whatever
          # /etc/resolv.conf the local NetBird daemon has installed.
          # The wrapper below waits for NetBird to overwrite /etc/resolv.conf
          # (kubelet initially writes the cluster CoreDNS IP) BEFORE haproxy
          # starts, since haproxy only reads resolv.conf once at boot.
          command:
            - /bin/sh
            - -c
            - |
              i=0
              until grep -qE "^nameserver 100\.107\." /etc/resolv.conf; do
                i=$((i+1))
                if [ $i -ge 60 ]; then
                  echo "[s3-forward] gave up waiting for NetBird DNS after 120s" >&2
                  exit 1
                fi
                echo "[s3-forward] waiting for NetBird DNS in /etc/resolv.conf (attempt $i)"
                sleep 2
              done
              echo "[s3-forward] NetBird DNS detected, starting haproxy"
              exec haproxy -W -db -f /usr/local/etc/haproxy/haproxy.cfg
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: s3-forward-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: s3-forward-config
          configMap:
            name: s3-forward-config
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
