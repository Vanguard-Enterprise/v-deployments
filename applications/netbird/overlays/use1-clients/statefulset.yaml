apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  # CANARY: convert only the highest-ordinal pod (netbird-client-2) to
  # hostNetwork first. partition=2 means only ordinals >= 2 take the new
  # template; netbird-client-0/1 stay on the previous (pod-network) spec.
  # After verifying P2P + that haproxy:443/Longhorn backups still work on
  # pod-2, drop partition to 0 to roll the remaining two.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 2
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      # Run in the node's network namespace so pod egress goes through the
      # node interface -> UniFi gateway (single NAT), instead of the pod's
      # double NAT (CNI SNAT is symmetric: a different source port per
      # destination, which makes STUN srflx candidates useless and forces
      # relay). hostNetwork also exposes the node's routable 10.1.x LAN IP as
      # an ICE host candidate for direct P2P with other LAN peers.
      # ClusterFirstWithHostNet keeps in-cluster DNS working under hostNetwork.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin the management/signal/relay hostname to the in-cluster Traefik
      # ClusterIP. NetBird overwrites /etc/resolv.conf to its own embedded
      # resolver, which forwards vngenterprise.com to 1.1.1.1 -> Cloudflare;
      # CF's ~100s connection cap then kills the long-lived gRPC stream
      # (continuous 504s -> ICE never initializes -> peers stuck on relay).
      # /etc/hosts is consulted before any resolver and NetBird does not touch
      # it, so this keeps the client on the internal path. Traefik serves the
      # valid LE *.vngenterprise.com cert, so TLS/h2 still verify. The matching
      # CoreDNS rewrite covers bootstrap resolution before NetBird takes over.
      hostAliases:
        - ip: 10.108.30.208
          hostnames:
            - netbird.vngenterprise.com
      containers:
        - name: client
          image: netbirdio/netbird:0.70.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: haproxy:2.8.10
          imagePullPolicy: IfNotPresent
          # Debian-based (glibc) haproxy with `parse-resolv-conf` in the
          # resolvers section. Each NetBird-client pod runs its OWN embedded
          # DNS resolver at its OWN NetBird IP (different per pod), so we
          # cannot hardcode the nameserver — we let haproxy read whatever
          # /etc/resolv.conf the local NetBird daemon has installed.
          # The wrapper below waits for NetBird to overwrite /etc/resolv.conf
          # (kubelet initially writes the cluster CoreDNS IP) BEFORE haproxy
          # starts, since haproxy only reads resolv.conf once at boot.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait until NetBird has overwritten /etc/resolv.conf with its
              # in-pod DNS nameserver (kubelet initially writes cluster DNS).
              i=0
              while ! grep -qE "^nameserver 100\.107\." /etc/resolv.conf; do
                i=$((i+1))
                if [ $i -ge 60 ]; then
                  echo "[s3-forward] gave up waiting for NetBird DNS after 120s" >&2
                  exit 1
                fi
                echo "[s3-forward] waiting for NetBird DNS in /etc/resolv.conf (attempt $i)"
                sleep 2
              done
              # Substitute the resolved NetBird DNS IP into the haproxy config
              # template (the ConfigMap mount is read-only, so write to a
              # writable runtime dir).
              ns=$(awk '/^nameserver 100\.107\./ {print $2; exit}' /etc/resolv.conf)
              echo "[s3-forward] NetBird DNS = $ns — starting haproxy"
              sed "s|__NETBIRD_DNS_IP__|$ns|g" \
                /usr/local/etc/haproxy/haproxy.cfg \
                > /run/haproxy/haproxy.cfg
              exec haproxy -W -db -f /run/haproxy/haproxy.cfg
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: s3-forward-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
            - name: s3-forward-runtime
              mountPath: /run/haproxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: s3-forward-config
          configMap:
            name: s3-forward-config
        - name: s3-forward-runtime
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
