apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      containers:
        - name: client
          image: netbirdio/netbird:0.70.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: haproxy:2.8.10
          imagePullPolicy: IfNotPresent
          # Debian-based (glibc) haproxy. Its own DNS resolver (configured to
          # use NetBird's in-pod DNS at 100.107.173.42) handles hostname
          # resolution for backup-storage.vngenterprise.com, with periodic
          # re-resolution. This replaces the earlier alpine/socat sidecar
          # whose musl libc getaddrinfo fails against this resolv.conf shape.
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: s3-forward-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: s3-forward-config
          configMap:
            name: s3-forward-config
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
