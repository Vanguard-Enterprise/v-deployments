apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  # CANARY: convert only netbird-client-2 (ordinal >= 2) to hostNetwork.
  # partition=2 leaves client-0/1 on the prior (pod-network) template. Verify
  # P2P + that haproxy:443 / Longhorn backups still work on pod-2, then drop
  # partition to 0 to roll the rest.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 2
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      # Run in the node's network namespace. Flannel's per-pod masquerade is
      # SYMMETRIC (verified: the same socket gets different public ports from
      # different STUN servers), which defeats STUN srflx and forces relay.
      # The node/host netns is CONE NAT (verified via a hostNetwork probe:
      # both STUN servers returned the same public port), so srflx works there
      # and direct P2P becomes possible. hostNetwork also exposes the node's
      # routable 10.1.x LAN IP as an ICE host candidate for LAN peers.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin the mgmt/signal/relay hostname to the Traefik LoadBalancer IP, NOT
      # the ClusterIP. Under hostNetwork, kube-proxy REJECTs UDP to a TCP-only
      # ClusterIP (the relay dials QUIC/UDP -> sendmsg: operation not permitted,
      # which broke an earlier attempt). UDP to the MetalLB LB IP works, and it
      # serves the same IngressRoute with the valid LE *.vngenterprise.com cert.
      # /etc/hosts is consulted before any resolver; NetBird only rewrites
      # resolv.conf, not /etc/hosts, so this keeps clients off the Cloudflare
      # hairpin (the ~100s CF cap was killing the long-lived gRPC stream).
      hostAliases:
        - ip: 10.1.50.175
          hostnames:
            - netbird.vngenterprise.com
      containers:
        - name: client
          image: netbirdio/netbird:0.70.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: haproxy:2.8.10
          imagePullPolicy: IfNotPresent
          # Debian-based (glibc) haproxy with `parse-resolv-conf` in the
          # resolvers section. Each NetBird-client pod runs its OWN embedded
          # DNS resolver at its OWN NetBird IP (different per pod), so we
          # cannot hardcode the nameserver — we let haproxy read whatever
          # /etc/resolv.conf the local NetBird daemon has installed.
          # The wrapper below waits for NetBird to overwrite /etc/resolv.conf
          # (kubelet initially writes the cluster CoreDNS IP) BEFORE haproxy
          # starts, since haproxy only reads resolv.conf once at boot.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait until NetBird has overwritten /etc/resolv.conf with its
              # in-pod DNS nameserver (kubelet initially writes cluster DNS).
              i=0
              while ! grep -qE "^nameserver 100\.107\." /etc/resolv.conf; do
                i=$((i+1))
                if [ $i -ge 60 ]; then
                  echo "[s3-forward] gave up waiting for NetBird DNS after 120s" >&2
                  exit 1
                fi
                echo "[s3-forward] waiting for NetBird DNS in /etc/resolv.conf (attempt $i)"
                sleep 2
              done
              # Substitute the resolved NetBird DNS IP into the haproxy config
              # template (the ConfigMap mount is read-only, so write to a
              # writable runtime dir).
              ns=$(awk '/^nameserver 100\.107\./ {print $2; exit}' /etc/resolv.conf)
              echo "[s3-forward] NetBird DNS = $ns — starting haproxy"
              sed "s|__NETBIRD_DNS_IP__|$ns|g" \
                /usr/local/etc/haproxy/haproxy.cfg \
                > /run/haproxy/haproxy.cfg
              exec haproxy -W -db -f /run/haproxy/haproxy.cfg
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: s3-forward-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
            - name: s3-forward-runtime
              mountPath: /run/haproxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: s3-forward-config
          configMap:
            name: s3-forward-config
        - name: s3-forward-runtime
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
