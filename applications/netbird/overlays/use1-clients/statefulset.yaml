apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-client
  namespace: netbird-client
spec:
  serviceName: netbird-client
  replicas: 3
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      # Pin the mgmt/signal/relay hostname to the in-cluster Traefik ClusterIP
      # so clients stay off the public Cloudflare hairpin (CF's ~100s cap was
      # killing the long-lived gRPC stream -> continuous 504s). NetBird rewrites
      # resolv.conf to its own resolver (which forwards vngenterprise.com to
      # Cloudflare), but /etc/hosts is consulted first and NetBird does not
      # touch it. Traefik serves the valid LE *.vngenterprise.com cert (h2).
      # NOTE: hostNetwork was trialed for pod P2P but REVERTED — it broke these
      # pods' routing-peer role (could not reach in-cluster MetalLB VIPs like
      # the internal Traefik .176, taking down internal-only sources e.g.
      # grafana). These pods stay on the pod network; relay P2P is fine.
      hostAliases:
        - ip: 10.108.30.208
          hostnames:
            - netbird.vngenterprise.com
      containers:
        - name: client
          image: netbirdio/netbird:0.71.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: netbird-client-setup
          env:
            - name: NB_MANAGEMENT_URL
              value: https://netbird.vngenterprise.com
          volumeMounts:
            - name: client-data
              mountPath: /var/lib/netbird
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: s3-forward
          image: haproxy:2.8.10
          imagePullPolicy: IfNotPresent
          # Debian-based (glibc) haproxy with `parse-resolv-conf` in the
          # resolvers section. Each NetBird-client pod runs its OWN embedded
          # DNS resolver at its OWN NetBird IP (different per pod), so we
          # cannot hardcode the nameserver — we let haproxy read whatever
          # /etc/resolv.conf the local NetBird daemon has installed.
          # The wrapper below waits for NetBird to overwrite /etc/resolv.conf
          # (kubelet initially writes the cluster CoreDNS IP) BEFORE haproxy
          # starts, since haproxy only reads resolv.conf once at boot.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait until NetBird has overwritten /etc/resolv.conf with its
              # in-pod DNS nameserver (kubelet initially writes cluster DNS).
              i=0
              while ! grep -qE "^nameserver 100\.107\." /etc/resolv.conf; do
                i=$((i+1))
                if [ $i -ge 60 ]; then
                  echo "[s3-forward] gave up waiting for NetBird DNS after 120s" >&2
                  exit 1
                fi
                echo "[s3-forward] waiting for NetBird DNS in /etc/resolv.conf (attempt $i)"
                sleep 2
              done
              # Substitute the resolved NetBird DNS IP into the haproxy config
              # template (the ConfigMap mount is read-only, so write to a
              # writable runtime dir).
              ns=$(awk '/^nameserver 100\.107\./ {print $2; exit}' /etc/resolv.conf)
              echo "[s3-forward] NetBird DNS = $ns — starting haproxy"
              sed "s|__NETBIRD_DNS_IP__|$ns|g" \
                /usr/local/etc/haproxy/haproxy.cfg \
                > /run/haproxy/haproxy.cfg
              exec haproxy -W -db -f /run/haproxy/haproxy.cfg
          ports:
            - name: s3
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: s3-forward-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
            - name: s3-forward-runtime
              mountPath: /run/haproxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: s3-forward-config
          configMap:
            name: s3-forward-config
        - name: s3-forward-runtime
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: client-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
