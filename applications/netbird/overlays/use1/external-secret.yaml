apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbird-server-config
  namespace: netbird
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  data:
    - secretKey: auth_secret
      remoteRef:
        key: netbird/environment
        property: NB_AUTH_SECRET
    - secretKey: management_json
      remoteRef:
        key: netbird/management
        property: management.json
  target:
    name: netbird-server-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        config.yaml: |
          server:
            listenAddress: ":80"
            exposedAddress: "https://netbird.vngenterprise.com:443"
            stunPorts:
              - 3478
            # External STUN servers advertised to clients INSTEAD of the
            # embedded STUN derived from exposedAddress. The derived endpoint
            # (stun:netbird.vngenterprise.com:3478) is unreachable because the
            # hostname is Cloudflare-proxied and the CF proxy does not pass
            # UDP/3478, which forced every NAT'd peer onto the relay. Public
            # STUN restores direct P2P. (Does NOT disable the embedded relay.)
            stuns:
              - uri: "stun:stun.cloudflare.com:3478"
                proto: "udp"
              - uri: "stun:stun.l.google.com:19302"
                proto: "udp"
            metricsPort: 9090
            healthcheckAddress: ":9000"
            logLevel: "info"
            logFile: "console"
            authSecret: "{{ .auth_secret }}"
            dataDir: "/var/lib/netbird/"
            disableAnonymousMetrics: true
            # Honor X-Forwarded-For so peer geolocation uses the real client IP
            # instead of the in-cluster Traefik hop IP (which is a private
            # 10.244.x address and geolocates to "unknown region"). NetBird walks
            # the XFF chain, treating these CIDRs as trusted proxies: the Traefik
            # pod network (TCP source of every request) plus the Cloudflare edge
            # ranges (so a trailing CF hop in XFF is skipped to reach the client).
            reverseProxy:
              trustedHTTPProxies:
                - "10.244.0.0/16"
                - "173.245.48.0/20"
                - "103.21.244.0/22"
                - "103.22.200.0/22"
                - "103.31.4.0/22"
                - "141.101.64.0/18"
                - "108.162.192.0/18"
                - "190.93.240.0/20"
                - "188.114.96.0/20"
                - "197.234.240.0/22"
                - "198.41.128.0/17"
                - "162.158.0.0/15"
                - "104.16.0.0/13"
                - "104.24.0.0/14"
                - "172.64.0.0/13"
                - "131.0.72.0/22"
                - "2400:cb00::/32"
                - "2606:4700::/32"
                - "2803:f800::/32"
                - "2405:b500::/32"
                - "2405:8100::/32"
                - "2a06:98c0::/29"
                - "2c0f:f248::/32"
              # Only honor X-Forwarded-For when the gRPC connection itself comes
              # from in-cluster (the Traefik pod network). NetBird's realip
              # interceptor parses forwarded headers ONLY if the direct peer is
              # in trustedPeers, otherwise it uses the raw connection IP. Default
              # ('0.0.0.0/0','::/0') trusts every connection and lets a client
              # spoof its geo via a forged XFF header — now that geolocation
              # drives posture-check policy, restrict trust to the proxy hop.
              trustedPeers:
                - "10.244.0.0/16"
            auth:
              issuer: "https://netbird.vngenterprise.com/oauth2"
              signKeyRefreshEnabled: true
              dashboardRedirectURIs:
                - "https://netbird.vngenterprise.com/nb-auth"
                - "https://netbird.vngenterprise.com/nb-silent-auth"
              cliRedirectURIs:
                - "http://localhost:53000/"
            store:
              engine: "sqlite"
              encryptionKey: "{{ (fromJson .management_json).DataStoreEncryptionKey }}"
