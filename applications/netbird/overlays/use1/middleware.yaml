apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cloudflare-only
  namespace: netbird
spec:
  # Restrict the NetBird ingress to Cloudflare edge IPs only. With the Traefik
  # LB on externalTrafficPolicy=Local the real L4 source is preserved, so the
  # request RemoteAddr is the Cloudflare edge that proxied it. ipAllowList with
  # no ipStrategy matches sourceRange against that RemoteAddr (NOT X-Forwarded-For),
  # so legitimate traffic (always via CF) is allowed and any direct-to-origin
  # access that bypasses Cloudflare is rejected. List = Cloudflare published
  # ranges (https://www.cloudflare.com/ips-v4 + ips-v6).
  ipAllowList:
    sourceRange:
      # In-cluster + LAN sources. REQUIRED: the CoreDNS rewrite resolves
      # netbird.vngenterprise.com -> traefik.traefik.svc for in-cluster pods
      # (keeps the netbird-client routing peers off CF's 100s-capped path), so
      # those peers reach this SAME IngressRoute from a pod IP (10.244.x), not a
      # Cloudflare IP. Omitting these 403s the in-cluster routing peers, which
      # drops the 10.1.50.0/24 mesh route. The lockdown still forces all EXTERNAL
      # (internet) traffic through Cloudflare.
      - 10.244.0.0/16
      - 10.1.50.0/24
      # Cloudflare published edge ranges (https://www.cloudflare.com/ips-v4 + ips-v6)
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22
      - 2400:cb00::/32
      - 2606:4700::/32
      - 2803:f800::/32
      - 2405:b500::/32
      - 2405:8100::/32
      - 2a06:98c0::/29
      - 2c0f:f248::/32
