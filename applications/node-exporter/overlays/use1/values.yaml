fullnameOverride: node-exporter

hostNetwork: true
hostPID: true
hostRootFsMount:
  enabled: true
  mountPropagation: HostToContainer

extraArgs:
  - --collector.systemd
  - --collector.processes
  - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
  - --collector.netclass.ignored-devices=^(veth.*|cali.*|cbr.*|cni.*|docker.*|flannel.*|kube-ipvs.*|nodelocaldns)$

tolerations:
  - operator: Exists

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 200m, memory: 256Mi }

service:
  port: 9100
  targetPort: 9100

# Chart-generated ServiceMonitor is disabled; we write our own simpler one below
# via the kustomization so alloy's prometheus.operator.servicemonitors picks it up cleanly.
prometheus:
  monitor:
    enabled: false
