apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pyroscope
  namespace: pyroscope
spec:
  serviceName: pyroscope-headless
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.7.0
          args:
            - -config.file=/etc/pyroscope/pyroscope.yaml
            - -config.expand-env=true
          ports:
            - name: http
              containerPort: 4040
            - name: grpc
              containerPort: 9095
            - name: gossip
              containerPort: 7946
          envFrom:
            - secretRef:
                name: pyroscope-global-env
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { cpu: 500m, memory: 2Gi }
          readinessProbe:
            httpGet: { path: /ready, port: 4040 }
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 10Gi
