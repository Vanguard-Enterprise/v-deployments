apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry-redis-secrets
  namespace: sentry-redis
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sentry-redis-secrets
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: redis/sentry
        property: password
