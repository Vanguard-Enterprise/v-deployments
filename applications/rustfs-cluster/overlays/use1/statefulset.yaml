apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  namespace: rustfs
spec:
  serviceName: rustfs-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rustfs
                topologyKey: kubernetes.io/hostname
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          command:
            - /usr/bin/rustfs
          args:
            - server
            - --console-address
            - ":9001"
            - http://rustfs-0.rustfs-headless.rustfs.svc.cluster.local:9000/data1
            - http://rustfs-0.rustfs-headless.rustfs.svc.cluster.local:9000/data2
            - http://rustfs-1.rustfs-headless.rustfs.svc.cluster.local:9000/data1
            - http://rustfs-1.rustfs-headless.rustfs.svc.cluster.local:9000/data2
            - http://rustfs-2.rustfs-headless.rustfs.svc.cluster.local:9000/data1
            - http://rustfs-2.rustfs-headless.rustfs.svc.cluster.local:9000/data2
          env:
            - name: RUSTFS_ROOT_USER
              valueFrom: { secretKeyRef: { name: rustfs-root, key: ROOT_USER } }
            - name: RUSTFS_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: rustfs-root, key: ROOT_PASSWORD } }
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data1
              mountPath: /data1
            - name: data2
              mountPath: /data2
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data1
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: data2
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 5Gi
