apiVersion: v1
kind: ConfigMap
metadata:
  name: rustlens-backend-config
  namespace: rustlens-backend
data:
  PORT: "8080"
  BOT_TARGET_SHARDS: "2"
  BOT_HEARTBEAT_TTL_SECONDS: "45"
  BATTLEMETRICS_SERVER_POLL_INTERVAL_SECONDS: "10"
  BM_MATCH_URL: "https://bm_api.osesem.xyz"
  APP_ORIGIN: "https://rustlens.com"
  ALLOW_AUTH_DEBUG_TOKENS: "false"
  PROXY_ENABLED: "true"
  OBSERVABILITY_ENABLED: "true"
  OTEL_SERVICE_NAME: rustlens-backend
  OTEL_SERVICE_NAMESPACE: rustlens
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=use1,team=rustlens"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy-receiver.alloy-receiver.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  PYROSCOPE_SERVER_ADDRESS: "http://alloy-receiver.alloy-receiver.svc.cluster.local:4040"
  DEPLOYMENT_ENV: use1
