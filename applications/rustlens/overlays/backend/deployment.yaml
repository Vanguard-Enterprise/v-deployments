apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustlens-backend
  namespace: rustlens-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rustlens-backend
  template:
    metadata:
      labels:
        app: rustlens-backend
    spec:
      imagePullSecrets:
        - name: github-pull-secret
      containers:
        - name: backend
          image: ghcr.io/vanguard-enterprise/rustlens-backend:main
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rustlens-backend-config
            - secretRef:
                name: rustlens-backend-secrets
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
