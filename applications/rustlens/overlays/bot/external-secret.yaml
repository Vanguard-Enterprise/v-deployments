apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustlens-bot-secrets
  namespace: rustlens-bot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rustlens-bot-secrets
    creationPolicy: Owner
  data:
    - secretKey: BOT_SERVICE_JWT_SECRET
      remoteRef:
        key: rustlens/production/shared
        property: BOT_SERVICE_JWT_SECRET
    - secretKey: DISCORD_TOKEN
      remoteRef:
        key: rustlens/production/bot
        property: DISCORD_TOKEN
    - secretKey: BOT_OWNER_GUILD_ID
      remoteRef:
        key: rustlens/production/bot
        property: BOT_OWNER_GUILD_ID
    - secretKey: BOT_OWNER_DISCORD_IDS
      remoteRef:
        key: rustlens/production/bot
        property: BOT_OWNER_DISCORD_IDS
