apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustlens-frontend
  namespace: rustlens-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rustlens-frontend
  template:
    metadata:
      labels:
        app: rustlens-frontend
    spec:
      imagePullSecrets:
        - name: github-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/vanguard-enterprise/rustlens-frontend:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rustlens-frontend-config
            - secretRef:
                name: rustlens-frontend-secrets
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
