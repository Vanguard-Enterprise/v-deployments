apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustlens-frontend-secrets
  namespace: rustlens-frontend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rustlens-frontend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        APP_API_INTERNAL_SECRET: "{{ .APP_API_INTERNAL_SECRET }}"
        APP_SESSION_SECRET: "{{ .APP_SESSION_SECRET }}"
        DISCORD_CLIENT_ID: "{{ .DISCORD_CLIENT_ID }}"
        DISCORD_CLIENT_SECRET: "{{ .DISCORD_CLIENT_SECRET }}"
        REDIS_URL: "redis://:{{ .redis_password }}@rustlens-redis-master.rustlens-redis.svc.cluster.local:6379/1"
        RATE_LIMIT_REDIS_URL: "redis://:{{ .redis_password }}@rustlens-redis-master.rustlens-redis.svc.cluster.local:6379/1"
  data:
    - secretKey: APP_API_INTERNAL_SECRET
      remoteRef:
        key: rustlens/production/shared
        property: APP_API_INTERNAL_SECRET
    - secretKey: APP_SESSION_SECRET
      remoteRef:
        key: rustlens/production/shared
        property: APP_SESSION_SECRET
    - secretKey: DISCORD_CLIENT_ID
      remoteRef:
        key: rustlens/production/frontend
        property: DISCORD_CLIENT_ID
    - secretKey: DISCORD_CLIENT_SECRET
      remoteRef:
        key: rustlens/production/frontend
        property: DISCORD_CLIENT_SECRET
    - secretKey: redis_password
      remoteRef:
        key: rustlens/production/redis
        property: password
