apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustlens
  namespace: rustlens-frontend
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    # Block API docs (Scalar UI + OpenAPI spec) from public access.
    # Higher priority than the catch-all /api route below.
    - match: Host(`rustlens.com`) && (Path(`/api/docs`) || PathPrefix(`/api/docs/`))
      kind: Rule
      priority: 200
      middlewares:
        - name: rustlens-block-external
      services:
        - name: rustlens-backend
          namespace: rustlens-backend
          port: 8080
    - match: Host(`rustlens.com`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      services:
        - name: rustlens-backend
          namespace: rustlens-backend
          port: 8080
    - match: Host(`rustlens.com`)
      kind: Rule
      priority: 1
      services:
        - name: rustlens-frontend
          port: 3000
  tls:
    store:
      name: rustlens
      namespace: traefik
