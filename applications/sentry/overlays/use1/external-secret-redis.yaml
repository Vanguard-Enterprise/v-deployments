apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry-redis-secret
  namespace: sentry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sentry-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef: { key: redis/sentry, property: password }
