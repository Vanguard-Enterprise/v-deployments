# PodMonitors are added incrementally per phase.
# Phase 2: skeleton (web only). Phase 6 expands to relay, worker, snuba, kafka, clickhouse.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sentry-web
  namespace: sentry
  labels:
    instance: primary
spec:
  selector:
    matchLabels:
      app: sentry
      role: web
  podMetricsEndpoints:
    - port: http
      path: /_metrics
      interval: 60s
