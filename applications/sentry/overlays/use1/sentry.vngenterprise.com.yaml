apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentry-web
  namespace: sentry
  annotations:
    kubernetes.io/ingress.class: traefik-internal
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sentry.vngenterprise.com`)
      kind: Rule
      services:
        - name: sentry-web
          port: 9000
  tls:
    store:
      name: default
      namespace: traefik
