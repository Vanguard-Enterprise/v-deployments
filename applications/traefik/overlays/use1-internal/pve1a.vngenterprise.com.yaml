apiVersion: v1
kind: Service
metadata:
  name: pve1a-external
  namespace: traefik
spec:
  ports:
    - name: https
      port: 8006
      protocol: TCP
      targetPort: 8006
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: pve1a-external-1
  namespace: traefik
  labels:
    kubernetes.io/service-name: pve1a-external
    endpointslice.kubernetes.io/managed-by: codex
addressType: IPv4
ports:
  - name: https
    port: 8006
    protocol: TCP
endpoints:
  - addresses:
      - 10.1.40.15
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pve1a
  namespace: traefik
  annotations:
    kubernetes.io/ingress.class: traefik-internal
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pve1a.vngenterprise.com`)
      kind: Rule
      services:
        - name: pve1a-external
          port: 8006
          scheme: https
  tls:
    store:
      name: default
      namespace: traefik
