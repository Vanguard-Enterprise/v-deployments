globalArguments:
  - "--global.sendanonymoususage=false"
  - "--global.checknewversion=false"
additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"

metrics:
  prometheus:
    enabled: true
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        instance: primary

deployment:
  enabled: true
  replicas: 3
  annotations: {}
  podAnnotations: {}
  additionalContainers: []
  initContainers: []

# Spread the 3 external Traefik replicas across nodes. Soft (preferred) so it
# never blocks scheduling, but with externalTrafficPolicy=Local (below) MetalLB
# only sends the VIP to nodes running a ready Traefik pod — piling every replica
# on one node would make that node a single point of failure for ALL external
# ingress. Anti-affinity keeps them on separate hosts.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik

ports:
  websecure:
    tls:
      enabled: true
    # Trust X-Forwarded-For / X-Real-Ip ONLY when the request comes directly
    # from a Cloudflare edge IP. Combined with externalTrafficPolicy=Local
    # (which preserves the real L4 source up to Traefik), this lets the real
    # client IP flow through to backends (e.g. NetBird geolocation) instead of
    # being masked by the proxy hop. List = Cloudflare published ranges
    # (https://www.cloudflare.com/ips-v4 + ips-v6).
    forwardedHeaders:
      trustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
  metrics:
    port: 9100
    expose:
      default: true
    exposedPort: 9100
    protocol: TCP

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
    ingressClass: traefik-external
    allowExternalNameServices: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: false
rbac:
  enabled: true
service:
  enabled: true
  type: LoadBalancer
  annotations: {}
  labels: {}
  spec:
    loadBalancerIP: 10.1.50.175
    # Preserve the real client (Cloudflare edge) source IP up to the Traefik pod.
    # Required for forwardedHeaders.trustedIPs (real client IP) and the
    # Cloudflare-only ipAllowList to see a CF address instead of a SNAT'd node IP.
    externalTrafficPolicy: Local
  loadBalancerSourceRanges: []
  externalIPs: []
