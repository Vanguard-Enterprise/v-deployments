apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: vanguard-identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      imagePullSecrets:
        - name: github-pull-secret
      containers:
        - name: identity-service
          image: ghcr.io/vanguard-enterprise/identity-service:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vanguard-services-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-service-secrets
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-service-secrets
                  key: ENCRYPTION_KEY
          volumeMounts:
            - name: jwt-key
              mountPath: /etc/secrets/jwt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: jwt-key
          secret:
            secretName: identity-service-secrets
            items:
              - key: JWT_PRIVATE_KEY
                path: private.pem
