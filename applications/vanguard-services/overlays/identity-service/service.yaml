apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: vanguard-identity
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: identity-service
