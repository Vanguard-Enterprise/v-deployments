apiVersion: v1
kind: Service
metadata:
  name: sso-service
  namespace: vanguard-sso
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: grpc
      port: 9092
      targetPort: 9092
      protocol: TCP
  selector:
    app: sso-service
