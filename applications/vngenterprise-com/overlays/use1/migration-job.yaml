apiVersion: batch/v1
kind: Job
metadata:
  name: vngenterprise-com-migrate
  namespace: vngenterprise-com
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: github-pull-secret
      containers:
        - name: migrate
          image: ghcr.io/vanguard-enterprise/vngenterprise-com:main
          imagePullPolicy: Always
          workingDir: /app/migrator
          command: ["node_modules/.bin/drizzle-kit", "migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vngenterprise-com-db-app
                  key: uri
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
