apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mancini-beer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vanguard-Enterprise/v-deployments
    path: applications/mancini-beer/base
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: mancini-beer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
