apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-rustlens
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vanguard-Enterprise/v-deployments
    path: applications/redis-operator/overlays/rustlens
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: rustlens-redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
