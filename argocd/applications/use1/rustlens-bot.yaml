apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustlens-bot
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: bot=ghcr.io/vanguard-enterprise/rustlens-bot:main
    argocd-image-updater.argoproj.io/bot.update-strategy: digest
    argocd-image-updater.argoproj.io/bot.pull-secret: pullsecret:argocd/ghcr-image-updater
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git
    argocd-image-updater.argoproj.io/write-back-target: kustomization:applications/rustlens/overlays/bot
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/Vanguard-Enterprise/v-deployments
    path: applications/rustlens/overlays/bot
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: rustlens-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
