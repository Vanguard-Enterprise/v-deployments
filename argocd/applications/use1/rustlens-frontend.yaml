apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustlens-frontend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: frontend=ghcr.io/vanguard-enterprise/rustlens-frontend:main
    argocd-image-updater.argoproj.io/frontend.update-strategy: digest
    argocd-image-updater.argoproj.io/frontend.pull-secret: pullsecret:argocd/ghcr-image-updater
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git
    argocd-image-updater.argoproj.io/write-back-target: kustomization:applications/rustlens/overlays/frontend
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/Vanguard-Enterprise/v-deployments
    path: applications/rustlens/overlays/frontend
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: rustlens-frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
