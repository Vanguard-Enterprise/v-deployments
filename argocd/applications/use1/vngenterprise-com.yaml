apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vngenterprise-com
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/vanguard-enterprise/vngenterprise-com:main
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.pull-secret: pullsecret:argocd/ghcr-image-updater
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/Vanguard-Enterprise/v-deployments
    path: applications/vngenterprise-com/overlays/use1
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: vngenterprise-com
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
