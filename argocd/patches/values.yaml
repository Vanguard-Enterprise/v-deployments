redis:
  enabled: false

redis-ha:
  enabled: true
  # Workaround for the sentinel container pinning 100% CPU after a rolling
  # restart (argoproj/argo-cd#16360, fix PR #20645). The sentinel event loop
  # wedges on stale sentinel/replica state; a `sentinel reset` shortly after
  # startup clears it. master group name is "argocd".
  sentinel:
    lifecycle:
      postStart:
        exec:
          command:
            - /bin/sh
            - -c
            - sleep 30; redis-cli -p 26379 sentinel reset argocd

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 2
    targetCPUUtilizationPercentage: 80

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
    targetCPUUtilizationPercentage: 80

applicationSet:
  replicas: 2

global:
  domain: argocd.vngenterprise.com

configs:
  cm:
    url: https://argocd.vngenterprise.com
    admin.enabled: false
    kustomize.buildOptions: --enable-helm
    statusbadge.enabled: "true"
    oidc.config: |
      name: Zitadel
      issuer: https://accounts.vngenterprise.com
      clientID: "356128038108333174"
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      logoutURL: https://accounts.vngenterprise.com/oidc/v1/end_session
      enablePKCEAuthentication: true

  rbac:
    create: true
    policy.csv: |
      g, argocd_administrators, role:admin
      g, argocd_users, role:readonly
    policy.default: ""
    scopes: "[groups]"